[build]
target = "x86_64-unknown-none"

[unstable]
build-std = ["core", "alloc"]

[target.x86_64-unknown-none]
rustflags = [
    "-C",
    "relocation-model=static",
    "-C",
    "link-arg=-Tkernel/src/linker.ld",
]

[target.aarch64-unknown-none]
rustflags = [
    "-C",
    "relocation-model=static",
    "-C",
    "link-arg=-Tkernel/src/linker.ld",
]
